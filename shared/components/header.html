<div class="header__logo">
    <button class="header__menu-toggle" onclick="toggleMenu()">
        <span class="material-symbols-outlined">menu</span>
    </button>
    <a href="../index.html" class="header__logo-link">
        <img src="../shared/svg/vieri.svg" alt="Vieri" />
    </a>
</div>

<div class="header__right-side">
    <div class="header__location">
        <button class="header__location-btn">
            <span class="material-symbols-outlined">location_on</span>
            <div class="header__location-info">
                <span class="header__company">Eksempel AS</span>
                <span class="header__location-name">Oslo Hovedkontor</span>
            </div>
            <span class="material-symbols-outlined header__chevron"
                >expand_more</span
            >
        </button>
    </div>

    <div class="header__actions">
        <button class="header__help">
            <span class="material-symbols-outlined">help_outline</span>
        </button>

        <a href="../cart-v2/index.html" class="header__cart" title="Handlekurv">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span class="header__cart-badge" hidden>0</span>
        </a>

        <button class="header__user">
            <div class="header__avatar">ME</div>
            <span class="header__user-name">Mikkel Eltervåg</span>
            <span class="material-symbols-outlined header__chevron"
                >expand_more</span
            >
        </button>
    </div>
</div>
