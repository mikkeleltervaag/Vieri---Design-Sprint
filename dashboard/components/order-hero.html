<div class="order-hero__content">
    <div class="order-hero__top">
        <h1>Hva trenger du i dag?</h1>
        <div class="order-hero__shortcuts">
            <a href="#" class="order-hero__shortcut order-hero__shortcut--favorites">
                <span class="material-symbols-outlined">star</span>
                Favoritter
            </a>
            <a href="#" class="order-hero__shortcut order-hero__shortcut--recent">
                <span class="material-symbols-outlined">receipt_long</span>
                Nylige ordrer
            </a>
            <a href="../order/?filter=nettbutikk" class="order-hero__shortcut order-hero__shortcut--punchout">
                <span class="material-symbols-outlined">storefront</span>
                Nettbutikk
            </a>
            <a href="#" class="order-hero__shortcut order-hero__shortcut--freetext" onclick="event.preventDefault(); FreetextModal.open()">
                <span class="material-symbols-outlined">edit_note</span>
                Fritekst
            </a>
        </div>
    </div>

    <div class="order-hero__search">
        <span class="material-symbols-outlined">search</span>
        <input
            type="text"
            placeholder="Søk etter produkter, leverandører eller ordrenummer..."
            autocomplete="off"
        />
        <div class="search-dropdown" hidden>
            <ul class="search-dropdown__results"></ul>
            <div class="search-dropdown__footer">
                <button class="search-dropdown__help-toggle" id="help-toggle">
                    <span class="material-symbols-outlined">help_outline</span>
                    Fant du ikke det du leter etter?
                </button>
                <a href="../order/index.html" class="search-dropdown__show-all">
                    <span class="material-symbols-outlined">grid_view</span>
                    Vis alle produkter
                </a>
            </div>
            <div class="search-dropdown__help-panel" id="help-panel" hidden>
                <div class="search-dropdown__help-actions">
                    <a href="../order/?filter=nettbutikk" class="no-results__btn no-results__btn--punchout">
                        <span class="material-symbols-outlined">storefront</span>
                        Søk i nettbutikker
                    </a>
                    <button class="no-results__btn no-results__btn--freetext" onclick="FreetextModal.open()">
                        <span class="material-symbols-outlined">edit_note</span>
                        Legg til som fritekst
                    </button>
                    <a href="#" class="no-results__btn no-results__btn--agreement" onclick="event.preventDefault()">
                        <span class="material-symbols-outlined">handshake</span>
                        Sjekk våre avtaler
                    </a>
                    <button class="no-results__btn no-results__btn--request" onclick="alert('Forespørsel sendt! Innkjøpsavdelingen vil vurdere å legge til produktet.')">
                        <span class="material-symbols-outlined">send</span>
                        Be om å legge til produkt
                    </button>
                </div>
            </div>
            <div class="search-dropdown__cart-bar" hidden>
                <div class="search-dropdown__cart-bar-inner">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span>
                        <strong class="search-dropdown__cart-count">0</strong> varer lagt til i handlekurven
                    </span>
                </div>
                <a href="../cart-v2/index.html" class="search-dropdown__cart-btn">
                    Gå til handlekurv
                    <span class="material-symbols-outlined">arrow_forward</span>
                </a>
            </div>
        </div>
    </div>
</div>
